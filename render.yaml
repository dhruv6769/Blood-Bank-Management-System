services:
  # Backend Web Service
  - type: web
    name: lifeflow-backend
    env: node
    plan: free
    rootDir: lifeflow-modern/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lifeflow-db
          property: connectionString
      - key: DB_DIALECT
        value: postgres
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: lifeflow-frontend
    env: static
    plan: free
    rootDir: lifeflow-modern/frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: lifeflow-backend
          property: host
    # For Vite apps we often need to rewrite to index.html for SPA routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: lifeflow-db
    plan: free
