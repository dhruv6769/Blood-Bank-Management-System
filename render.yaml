services:
  # Backend Web Service
  - type: web
    name: lifeflow-backend
    env: node
    plan: free
    rootDir: lifeflow-modern/backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: lifeflow-db
          property: connectionString
      - key: DB_DIALECT
        value: postgres
      - key: JWT_SECRET
        generateValue: true

  # Frontend Web Service (Using Node for reliability)
  - type: web
    name: lifeflow-frontend
    env: node
    plan: free
    rootDir: lifeflow-modern/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: VITE_API_URL
        value: https://lifeflow-backend.onrender.com/api
      - key: NODE_VERSION
        value: 20

databases:
  - name: lifeflow-db
    plan: free
